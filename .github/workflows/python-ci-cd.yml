name: Python CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.11]  # Test on Python 3.9 and 3.11

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 mypy black bandit pylint isort safety pydocstyle radon

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 src tests --count --max-complexity=12 --max-line-length=99 --statistics

    - name: Security scan with Bandit
      run: |
        bandit -r src/ -ll

    - name: Lint with pylint
      run: |
        pylint --disable=C0111,R0903,C0103 src tests || true

    - name: Sort imports with isort
      run: |
        isort --check --profile black src tests

    - name: Check for dependency vulnerabilities
      run: |
        safety check

    - name: Check docstrings with pydocstyle
      run: |
        pydocstyle --convention=numpy src || true

    - name: Check code complexity with radon
      run: |
        radon cc src -a -nc

    - name: Type check with mypy
      run: |
        mypy src tests

    - name: Check formatting with black
      run: |
        black --check src tests

    - name: Run tests with pytest
      run: |
        pytest --cov=src tests/

    - name: Upload test coverage
      uses: codecov/codecov-action@v3
      if: success()
      with:
        fail_ci_if_error: false

  build-and-package:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
        pip install -r requirements.txt

    - name: Build package
      run: |
        python -m build

    - name: Archive distribution package
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/
        retention-days: 7

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: gal-friday:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Test Docker image
      run: |
        docker-compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit

  docker-publish:
    needs: [build-and-package, docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-package, docker-publish]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
        path: dist/

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Deploy to development environment
      run: |
        echo "Deploying to development environment"
        # Make the deployment script executable (for Linux runners)
        if [ -f "scripts/deploy.sh" ]; then
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh development
        else
          # Fallback deployment steps if script is not available
          echo "Pulling Docker image"
          docker pull ghcr.io/${{ github.repository }}:latest

          echo "Stopping existing containers"
          docker-compose -f docker-compose.yml -f docker-compose.development.yml down || true

          echo "Starting new containers"
          docker-compose -f docker-compose.yml -f docker-compose.development.yml up -d
        fi

    - name: Run post-deployment tests
      run: |
        echo "Running post-deployment validation tests"
        # Add post-deployment validation tests here
