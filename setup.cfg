[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist,docs,venv,.DS_Store,.idea,.vscode,.gitignore,.gitattributes,.travis.yml,.pre-commit-config.yaml,.flake8-cache,.mypy_cache,.pytest_cache,.coverage,.coverage.xml,.coverage.data,.coverage.xml,.coverage.xml,.coverage.xml,.coverage.xml,.coverage.xml,.coverage.xml,.coverage.xml,.coverage.xml,.coverage.xml,.
per-file-ignores =
    # Allow unused imports in __init__.py files
    __init__.py:F401
    # Allow unused imports in test fixtures
    tests/conftest.py:F401
    # Allow slightly higher complexity in these implementation files
    src/gal_friday/cli_service.py:C901
    src/gal_friday/main.py:C901
    src/gal_friday/monitoring_service.py:C901
    src/gal_friday/portfolio_manager.py:C901
    src/gal_friday/risk_manager.py:C901

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Exclude tests directory from type checking strictness
[mypy.plugins.numpy.*]
follow_imports = silent

# Per-module options
[mypy.src.gal_friday.*]
disallow_untyped_defs = True

# Handle third-party libraries without type stubs
[mypy.pandas]
ignore_missing_imports = True

[mypy.ccxt]
ignore_missing_imports = True

[mypy.xgboost]
ignore_missing_imports = True

[mypy.sklearn.*]
ignore_missing_imports = True

[mypy.APScheduler]
ignore_missing_imports = True

[mypy.pypubsub]
ignore_missing_imports = True

[mypy.influxdb_client]
ignore_missing_imports = True