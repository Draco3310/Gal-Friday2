[tool.black]
line-length = 99
preview = true
target-version = ['py39']

[tool.isort]
profile = "black"
line_length = 99
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = [".venv/*", "__pycache__/*"]

[tool.mypy]
python_version = "3.11"
exclude = ["\\.venv/", "src/gal_friday/event_bus.py"]

# Strictness flags
check_untyped_defs = true
disallow_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true 
warn_return_any = true
strict_optional = true

# Module discovery
ignore_missing_imports = false
follow_imports = "normal"

[[tool.mypy.overrides]]
module = [
    "sklearn.*",
    "joblib.*",
    "sortedcontainers.*",
    "pandas_ta.*",
    "pandas",
    "asyncio.queues"
]
ignore_missing_imports = true

# Bandit configuration
[tool.bandit]
skips = ["B101", "B107", "B311", "B105"]
# B101: Skip assert warnings (common in tests)
# B107: Skip hardcoded password detection for default parameters
# B311: Skip random number generator warning for non-crypto uses
# B105: Skip hardcoded password string warnings

exclude_dirs = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_functions = "test_*"
python_classes = "Test*"
